name: Bytenut 续期

on:
  schedule:
    - cron: '0 */1 * * *' # 每小时自动运行
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    name: 运行续期脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖项
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver
          
      - name: Launch sing-box if VLINK set
        env:
          VLINK: ${{ secrets.VLINK }}
        if: ${{ env.VLINK != '' }}
        run: |
            curl -LO https://amd64.ssss.nyc.mn/sb
            curl -LO https://raw.githubusercontent.com/liveqte/jupyter-notebook-deployed/refs/heads/main/vlink_to_sb.py
            chmod +x sb
            python vlink_to_sb.py $VLINK > v.json
            nohup ./sb run -c v.json > /dev/null 2>&1 &
            sleep 3
            
      - name: 运行续期脚本
        env:
          BYTENUT: ${{ secrets.BYTENUT }}
          BYTENUT_TOKEN : ${{ secrets.BYTENUT_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY:  http://127.0.0.1:1080
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
          xvfb-run -a python3 main.py

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
